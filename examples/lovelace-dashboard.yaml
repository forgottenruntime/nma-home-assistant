# NMA Mobile Credentials — example dashboard
#
# How to use:
#   Dashboard → Edit dashboard → ⋮ (top-right) → Raw configuration editor
#   → paste this in (replacing everything, or merge the `views:` list).
#
# This example targets a company whose entities are prefixed
# `red_bull_sandbox`. If your company slug differs, find-and-replace
# `red_bull_sandbox` with yours (it is the slugified device name).
#
# The two gauges hard-code max: 300 to match this company's limits. Set each
# gauge's `max:` to your own `max_credentials` / `max_people` value (shown in
# the Diagnostics section).
views:
  - title: NMA
    path: nma
    type: sections
    max_columns: 3
    dense_section_placement: true
    sections:
      # ------------------------------------------------------------------ #
      # System status — at-a-glance health chip
      #   Green when connectivity is up and no problem counters are set;
      #   red and lists the problems (with names) otherwise.
      #   Names come from the `members` attribute on the breakdown sensors
      #   (NMA integration v0.1.5+). Toggle input_boolean.nma_anonymise to
      #   mask names to initials (see examples/helpers.yaml). No HACS deps.
      # ------------------------------------------------------------------ #
      - type: grid
        cards:
          - type: markdown
            content: |
              {% macro names(entities, attr) -%}
              {%- set anon = is_state('input_boolean.nma_anonymise','on') -%}
              {%- set ns = namespace(seen=[], out=[]) -%}
              {%- for e in entities -%}
                {%- for m in (state_attr(e, 'members') or []) -%}
                  {%- set val = m[attr] -%}
                  {%- if val and val not in ns.seen -%}
                    {%- set ns.seen = ns.seen + [val] -%}
                    {%- if anon -%}{%- set val = (val.split() | map('first') | join('. ')) ~ '.' -%}{%- endif -%}
                    {%- set ns.out = ns.out + [val] -%}
                  {%- endif -%}
                {%- endfor -%}
              {%- endfor -%}
              {{- ns.out[:10] | join(', ') }}{% if ns.out | length > 10 %} +{{ ns.out | length - 10 }} more{% endif %}
              {%- endmacro -%}
              {% set p = namespace(items=[]) %}
              {% if is_state('binary_sensor.red_bull_sandbox_api_reachable','off') %}{% set p.items = p.items + ['API unreachable'] %}{% endif %}
              {% if is_state('binary_sensor.red_bull_sandbox_acs_websocket','off') %}{% set p.items = p.items + ['ACS WebSocket down'] %}{% endif %}
              {% set cb = ['sensor.red_bull_sandbox_credentials_blocked_by_platform','sensor.red_bull_sandbox_credentials_blocked_by_acs','sensor.red_bull_sandbox_credentials_person_blocked_by_acs'] %}
              {% set n = names(cb, 'person') | trim %}
              {% if n %}{% set p.items = p.items + ['credentials blocked: ' ~ n] %}{% endif %}
              {% set n = names(['sensor.red_bull_sandbox_credentials_uap_migration_failed'], 'person') | trim %}
              {% if n %}{% set p.items = p.items + ['credential migration failed: ' ~ n] %}{% endif %}
              {% set pb = ['sensor.red_bull_sandbox_people_blocked_by_acs','sensor.red_bull_sandbox_people_removed_by_acs'] %}
              {% set n = names(pb, 'name') | trim %}
              {% if n %}{% set p.items = p.items + ['people blocked/removed: ' ~ n] %}{% endif %}
              {% set n = names(['sensor.red_bull_sandbox_people_uap_migration_failed'], 'name') | trim %}
              {% if n %}{% set p.items = p.items + ['people migration failed: ' ~ n] %}{% endif %}
              {% set v = states('sensor.red_bull_sandbox_acs_websocket_pending_messages')|int(0) %}
              {% if v > 50 %}{% set p.items = p.items + [v ~ ' pending ACS messages'] %}{% endif %}
              {% if p.items %}## ⛔ NMA — attention needed
              {{ p.items | join('

              ') }}{% else %}## ✅ NMA — all systems OK
              Connectivity up · no blocked or failed credentials or people.{% endif %}
          # Toggle to mask first/last names to initials across the dashboard.
          # Requires the input_boolean.nma_anonymise helper (examples/helpers.yaml).
          - type: tile
            entity: input_boolean.nma_anonymise
            name: Anonymise names
            icon: mdi:incognito

      # ------------------------------------------------------------------ #
      # Company overview
      # ------------------------------------------------------------------ #
      - type: grid
        cards:
          - type: heading
            heading: Company
            icon: mdi:office-building
          - type: tile
            entity: sensor.red_bull_sandbox_company_status
            name: Status
          - type: tile
            entity: sensor.red_bull_sandbox_company_type
            name: Type
          - type: tile
            entity: sensor.red_bull_sandbox_acs
            name: ACS
          - type: tile
            entity: sensor.red_bull_sandbox_uap_migration_status
            name: UAP migration
          - type: tile
            entity: sensor.red_bull_sandbox_enabled_platforms
            name: Enabled platforms
          - type: tile
            entity: sensor.red_bull_sandbox_use_app_key
            name: Uses app key

      # ------------------------------------------------------------------ #
      # Usage gauges (replace the old text totals)
      # ------------------------------------------------------------------ #
      - type: grid
        cards:
          - type: heading
            heading: Usage
            icon: mdi:gauge
          - type: gauge
            entity: sensor.red_bull_sandbox_credentials_total
            name: Credentials
            min: 0
            max: 300  # set to your max_credentials
            needle: true
            severity:
              green: 0
              yellow: 240
              red: 270
          - type: gauge
            entity: sensor.red_bull_sandbox_people_total
            name: People
            min: 0
            max: 300  # set to your max_people
            needle: true
            severity:
              green: 0
              yellow: 240
              red: 270

      # ------------------------------------------------------------------ #
      # Connectivity & health
      # ------------------------------------------------------------------ #
      - type: grid
        cards:
          - type: heading
            heading: Connectivity & health
            icon: mdi:lan-connect
          - type: tile
            entity: binary_sensor.red_bull_sandbox_api_reachable
            name: API reachable
          - type: tile
            entity: binary_sensor.red_bull_sandbox_acs_websocket
            name: ACS WebSocket
          - type: tile
            entity: sensor.red_bull_sandbox_acs_websocket_pending_messages
            name: Pending messages
          - type: tile
            entity: sensor.red_bull_sandbox_acs_websocket_up_since
            name: WebSocket up since
          - type: tile
            entity: sensor.red_bull_sandbox_last_successful_update
            name: Last update
          - type: tile
            entity: sensor.red_bull_sandbox_last_update_duration
            name: Update duration

      # ------------------------------------------------------------------ #
      # Alerts — last fired
      # (entity_ids are the slugified automation aliases from
      #  examples/automations.yaml; adjust if yours differ — check
      #  Developer Tools → States → type "automation.nma")
      # ------------------------------------------------------------------ #
      - type: grid
        cards:
          - type: heading
            heading: Alerts
            icon: mdi:bell-alert
          - type: entities
            title: Last fired
            show_header_toggle: false
            state_color: true
            entities:
              - entity: automation.nma_credentials_blocked
                name: Credentials blocked
                secondary_info: last-triggered
              - entity: automation.nma_uap_migration_failed
                name: UAP migration failed
                secondary_info: last-triggered
              - entity: automation.nma_people_blocked_or_removed
                name: People blocked/removed
                secondary_info: last-triggered
              - entity: automation.nma_acs_websocket_down
                name: ACS WebSocket down
                secondary_info: last-triggered
              - entity: automation.nma_api_unreachable
                name: API unreachable
                secondary_info: last-triggered
              - entity: automation.nma_acs_message_backlog
                name: ACS message backlog
                secondary_info: last-triggered

      # ------------------------------------------------------------------ #
      # Blocked / flagged — only shown when something is actually wrong.
      # Uses a `conditional` card (robust, well-supported) that appears only
      # when at least one blocked / removed / migration-failed counter is > 0.
      # Names come from the `members` attribute (NMA integration v0.1.5+).
      # ------------------------------------------------------------------ #
      - type: grid
        cards:
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - condition: numeric_state
                    entity: sensor.red_bull_sandbox_people_blocked_by_acs
                    above: 0
                  - condition: numeric_state
                    entity: sensor.red_bull_sandbox_people_removed_by_acs
                    above: 0
                  - condition: numeric_state
                    entity: sensor.red_bull_sandbox_credentials_blocked_by_platform
                    above: 0
                  - condition: numeric_state
                    entity: sensor.red_bull_sandbox_credentials_blocked_by_acs
                    above: 0
                  - condition: numeric_state
                    entity: sensor.red_bull_sandbox_credentials_person_blocked_by_acs
                    above: 0
                  - condition: numeric_state
                    entity: sensor.red_bull_sandbox_people_uap_migration_failed
                    above: 0
                  - condition: numeric_state
                    entity: sensor.red_bull_sandbox_credentials_uap_migration_failed
                    above: 0
            card:
              type: markdown
              content: |
                ## ⚠️ Blocked / flagged
                {% set anon = is_state('input_boolean.nma_anonymise','on') %}
                {% macro people(entities) -%}
                {%- set ns = namespace(seen=[], rows=[]) -%}
                {%- for e in entities -%}
                  {%- for m in (state_attr(e, 'members') or []) -%}
                    {%- if m.id not in ns.seen -%}
                      {%- set ns.seen = ns.seen + [m.id] -%}
                      {%- set nm = (m.name.split() | map('first') | join('. ')) ~ '.' if anon else m.name -%}
                      {%- set ns.rows = ns.rows + ['- **' ~ nm ~ '**' ~ (' <' ~ m.email ~ '>' if (m.email and not anon) else '')] -%}
                    {%- endif -%}
                  {%- endfor -%}
                {%- endfor -%}
                {{- ns.rows | join('\n') -}}
                {%- endmacro -%}
                {% macro creds(entities) -%}
                {%- set ns = namespace(seen=[], rows=[]) -%}
                {%- for e in entities -%}
                  {%- for m in (state_attr(e, 'members') or []) -%}
                    {%- if m.id not in ns.seen -%}
                      {%- set ns.seen = ns.seen + [m.id] -%}
                      {%- set pn = (m.person.split() | map('first') | join('. ')) ~ '.' if anon else m.person -%}
                      {%- set ns.rows = ns.rows + ['- #' ~ m.number ~ ' — ' ~ pn] -%}
                    {%- endif -%}
                  {%- endfor -%}
                {%- endfor -%}
                {{- ns.rows | join('\n') -}}
                {%- endmacro -%}
                {% set pb = people(['sensor.red_bull_sandbox_people_blocked_by_acs','sensor.red_bull_sandbox_people_removed_by_acs']) | trim %}
                {% set pm = people(['sensor.red_bull_sandbox_people_uap_migration_failed']) | trim %}
                {% set cb = creds(['sensor.red_bull_sandbox_credentials_blocked_by_platform','sensor.red_bull_sandbox_credentials_blocked_by_acs','sensor.red_bull_sandbox_credentials_person_blocked_by_acs']) | trim %}
                {% set cm = creds(['sensor.red_bull_sandbox_credentials_uap_migration_failed']) | trim %}
                {% if pb %}**People blocked / removed**
                {{ pb }}
                {% endif %}{% if pm %}**People — migration failed**
                {{ pm }}
                {% endif %}{% if cb %}**Credentials blocked**
                {{ cb }}
                {% endif %}{% if cm %}**Credentials — migration failed**
                {{ cm }}
                {% endif %}

      # ------------------------------------------------------------------ #
      # Credentials breakdown
      # ------------------------------------------------------------------ #
      - type: grid
        cards:
          - type: heading
            heading: Credentials
            icon: mdi:cellphone-key
          - type: entities
            title: Breakdown
            show_header_toggle: false
            state_color: true
            entities:
              - type: section
                label: By status
              - entity: sensor.red_bull_sandbox_credentials_active
                name: Active
              - entity: sensor.red_bull_sandbox_credentials_pending_for_platform
                name: Pending for platform
              - entity: sensor.red_bull_sandbox_credentials_pending_for_acs
                name: Pending for ACS
              - entity: sensor.red_bull_sandbox_credentials_unlinked_by_platform
                name: Unlinked by platform
              - entity: sensor.red_bull_sandbox_credentials_blocked_by_platform
                name: Blocked by platform
              - entity: sensor.red_bull_sandbox_credentials_blocked_by_acs
                name: Blocked by ACS
              - entity: sensor.red_bull_sandbox_credentials_person_blocked_by_acs
                name: Person blocked by ACS
              - type: section
                label: By platform
              - entity: sensor.red_bull_sandbox_credentials_on_apple
                name: Apple
              - entity: sensor.red_bull_sandbox_credentials_on_google
                name: Google
              - entity: sensor.red_bull_sandbox_credentials_on_uap
                name: UAP
              - type: section
                label: By device
              - entity: sensor.red_bull_sandbox_credentials_on_phone
                name: Phone
              - entity: sensor.red_bull_sandbox_credentials_on_wearable
                name: Wearable
              - type: section
                label: By migration status
              - entity: sensor.red_bull_sandbox_credentials_uap_legacy
                name: Legacy
              - entity: sensor.red_bull_sandbox_credentials_uap_migrating
                name: Migrating
              - entity: sensor.red_bull_sandbox_credentials_uap_migration_failed
                name: Migration failed
              - entity: sensor.red_bull_sandbox_credentials_uap_uap
                name: UAP

      # ------------------------------------------------------------------ #
      # People breakdown
      # ------------------------------------------------------------------ #
      - type: grid
        cards:
          - type: heading
            heading: People
            icon: mdi:account-multiple
          - type: entities
            title: Breakdown
            show_header_toggle: false
            state_color: true
            entities:
              - type: section
                label: By status
              - entity: sensor.red_bull_sandbox_people_active
                name: Active
              - entity: sensor.red_bull_sandbox_people_inactive
                name: Inactive
              - entity: sensor.red_bull_sandbox_people_blocked_by_acs
                name: Blocked by ACS
              - entity: sensor.red_bull_sandbox_people_removed_by_acs
                name: Removed by ACS
              - type: section
                label: By platform
              - entity: sensor.red_bull_sandbox_people_on_apple
                name: Apple
              - entity: sensor.red_bull_sandbox_people_on_google
                name: Google
              - entity: sensor.red_bull_sandbox_people_on_uap
                name: UAP
              - type: section
                label: By migration status
              - entity: sensor.red_bull_sandbox_people_uap_legacy
                name: Legacy
              - entity: sensor.red_bull_sandbox_people_uap_migrating
                name: Migrating
              - entity: sensor.red_bull_sandbox_people_uap_migration_failed
                name: Migration failed
              - entity: sensor.red_bull_sandbox_people_uap_uap
                name: UAP

      # ------------------------------------------------------------------ #
      # Devices — what kind of device each person carries.
      #   The API only knows PHONE vs WEARABLE + platform; friendly labels
      #   (iPhone, Apple Watch, ...) are derived by the integration (v0.1.6+)
      #   and exposed on the credential `members` attribute and per person.
      #   Honours the Anonymise names toggle.
      # ------------------------------------------------------------------ #
      - type: grid
        cards:
          - type: heading
            heading: Devices
            icon: mdi:devices
          - type: markdown
            content: |
              {% set anon = is_state('input_boolean.nma_anonymise','on') %}
              {%- set all = (state_attr('sensor.red_bull_sandbox_credentials_on_phone','members') or []) + (state_attr('sensor.red_bull_sandbox_credentials_on_wearable','members') or []) -%}
              {% if all %}**By device type**
              {% for device, items in all | groupby('device') %}- **{{ device }}**: {{ items | list | length }}
              {% endfor %}
              {%- set watches = state_attr('sensor.red_bull_sandbox_credentials_on_wearable','members') or [] -%}
              {% if watches %}
              **Who has a wearable**
              {% for m in watches %}- {{ (m.person.split() | map('first') | join('. ')) ~ '.' if anon else m.person }} — {{ m.device }}
              {% endfor %}{% endif %}{% else %}No device data yet.{% endif %}
          - type: tile
            entity: sensor.red_bull_sandbox_credentials_on_phone
            name: Phones
            icon: mdi:cellphone
          - type: tile
            entity: sensor.red_bull_sandbox_credentials_on_wearable
            name: Wearables
            icon: mdi:watch

      # ------------------------------------------------------------------ #
      # Individual credentials (per-credential sensors, enabled on demand)
      # ------------------------------------------------------------------ #
      - type: grid
        cards:
          - type: heading
            heading: Individual credentials
            icon: mdi:card-account-details
          - type: tile
            entity: sensor.red_bull_sandbox_nma_credential_1038024114_bart_sandbox_vervueren
            name: Bart · #1038024114
          - type: tile
            entity: sensor.red_bull_sandbox_nma_credential_9669142438_bart_sandbox_vervueren
            name: Bart · #9669142438

      # ------------------------------------------------------------------ #
      # Trends — recent (history graphs, need recorder history)
      # ------------------------------------------------------------------ #
      - type: grid
        cards:
          - type: heading
            heading: Trends — recent
            icon: mdi:chart-line
          - type: history-graph
            title: Totals (7 days)
            hours_to_show: 168
            entities:
              - entity: sensor.red_bull_sandbox_people_total
                name: People
              - entity: sensor.red_bull_sandbox_credentials_total
                name: Credentials
          - type: history-graph
            title: ACS pending messages (24 h)
            hours_to_show: 24
            entities:
              - entity: sensor.red_bull_sandbox_acs_websocket_pending_messages
                name: Pending messages
          - type: history-graph
            title: Connectivity (24 h)
            hours_to_show: 24
            entities:
              - entity: binary_sensor.red_bull_sandbox_api_reachable
                name: API reachable
              - entity: binary_sensor.red_bull_sandbox_acs_websocket
                name: ACS WebSocket
          - type: history-graph
            title: Poll duration (24 h)
            hours_to_show: 24
            entities:
              - entity: sensor.red_bull_sandbox_last_update_duration
                name: Update duration
          - type: history-graph
            title: People blocked / removed (7 days)
            hours_to_show: 168
            entities:
              - entity: sensor.red_bull_sandbox_people_blocked_by_acs
                name: Blocked by ACS
              - entity: sensor.red_bull_sandbox_people_removed_by_acs
                name: Removed by ACS

      # ------------------------------------------------------------------ #
      # Trends — long term (statistics, survive recorder purges)
      # ------------------------------------------------------------------ #
      - type: grid
        cards:
          - type: heading
            heading: Trends — long term
            icon: mdi:chart-bell-curve-cumulative
          - type: statistics-graph
            title: Totals (90 days, daily)
            period: day
            days_to_show: 90
            stat_types:
              - min
              - mean
              - max
            entities:
              - entity: sensor.red_bull_sandbox_people_total
                name: People
              - entity: sensor.red_bull_sandbox_credentials_total
                name: Credentials
          - type: statistics-graph
            title: ACS pending messages (30 days)
            period: day
            days_to_show: 30
            stat_types:
              - max
              - mean
            entities:
              - entity: sensor.red_bull_sandbox_acs_websocket_pending_messages
                name: Pending messages
          - type: statistics-graph
            title: People blocked / removed (90 days)
            period: day
            days_to_show: 90
            stat_types:
              - max
              - mean
            entities:
              - entity: sensor.red_bull_sandbox_people_blocked_by_acs
                name: Blocked by ACS
              - entity: sensor.red_bull_sandbox_people_removed_by_acs
                name: Removed by ACS

      # ------------------------------------------------------------------ #
      # Diagnostics
      # ------------------------------------------------------------------ #
      - type: grid
        cards:
          - type: heading
            heading: Diagnostics
            icon: mdi:information-outline
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.red_bull_sandbox_tenant_id
                name: Tenant ID
              - entity: sensor.red_bull_sandbox_tci_value
                name: TCI value
              - entity: sensor.red_bull_sandbox_df_name
                name: DF name
              - entity: sensor.red_bull_sandbox_max_people
                name: Max people
              - entity: sensor.red_bull_sandbox_max_credentials
                name: Max credentials
