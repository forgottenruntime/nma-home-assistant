# NMA Mobile Credentials — example automations
#
# These turn the integration's "problem state" sensors into actionable alerts,
# so the many breakdown sensors that normally sit at 0 become useful instead of
# just noise on the dashboard.
#
# Uses current Home Assistant automation syntax (triggers/conditions/actions
# with `trigger:` and `action:` keys, HA 2024.10+).
#
# ── How to use ──────────────────────────────────────────────────────────────
#   * Settings → Automations & scenes → ⋮ → Edit in YAML, paste one in, OR
#   * append these to your `automations.yaml`
#     (configuration.yaml: `automation: !include automations.yaml`).
#
#   Replace the `red_bull_sandbox` slug with your own company slug if different.
#
# ── Phone push ──────────────────────────────────────────────────────────────
#   Each alert raises a persistent notification AND pushes to
#   notify.mobile_app_bart_iphone15. To use a different phone, replace that
#   service name throughout this file. To disable phone push, delete the
#   second `- action: notify.mobile_app_bart_iphone15` block in each automation.

# --------------------------------------------------------------------------- #
# 1. Any credential moved into a blocked state
# --------------------------------------------------------------------------- #
- id: nma_credentials_blocked
  alias: "NMA · Credentials blocked"
  description: "Fires when any credential is blocked (by platform, ACS, or person)."
  mode: single
  triggers:
    - trigger: numeric_state
      entity_id:
        - sensor.red_bull_sandbox_credentials_blocked_by_platform
        - sensor.red_bull_sandbox_credentials_blocked_by_acs
        - sensor.red_bull_sandbox_credentials_person_blocked_by_acs
      above: 0
  actions:
    - action: persistent_notification.create
      data:
        notification_id: nma_credentials_blocked
        title: "NMA: credentials blocked"
        message: >-
          Blocked credentials detected —
          by platform: {{ states('sensor.red_bull_sandbox_credentials_blocked_by_platform') }},
          by ACS: {{ states('sensor.red_bull_sandbox_credentials_blocked_by_acs') }},
          person blocked by ACS: {{ states('sensor.red_bull_sandbox_credentials_person_blocked_by_acs') }}.
    - action: notify.mobile_app_bart_iphone15
      data:
        title: "NMA: credentials blocked"
        message: >-
          Blocked — platform {{ states('sensor.red_bull_sandbox_credentials_blocked_by_platform') }},
          ACS {{ states('sensor.red_bull_sandbox_credentials_blocked_by_acs') }},
          person {{ states('sensor.red_bull_sandbox_credentials_person_blocked_by_acs') }}.

# --------------------------------------------------------------------------- #
# 2. UAP migration failures (credentials or people)
# --------------------------------------------------------------------------- #
- id: nma_migration_failed
  alias: "NMA · UAP migration failed"
  description: "Fires when any credential or person is in MIGRATION_FAILED."
  mode: single
  triggers:
    - trigger: numeric_state
      entity_id:
        - sensor.red_bull_sandbox_credentials_uap_migration_failed
        - sensor.red_bull_sandbox_people_uap_migration_failed
      above: 0
  actions:
    - action: persistent_notification.create
      data:
        notification_id: nma_migration_failed
        title: "NMA: UAP migration failed"
        message: >-
          Migration failures —
          credentials: {{ states('sensor.red_bull_sandbox_credentials_uap_migration_failed') }},
          people: {{ states('sensor.red_bull_sandbox_people_uap_migration_failed') }}.
    - action: notify.mobile_app_bart_iphone15
      data:
        title: "NMA: UAP migration failed"
        message: >-
          Migration failed — credentials {{ states('sensor.red_bull_sandbox_credentials_uap_migration_failed') }},
          people {{ states('sensor.red_bull_sandbox_people_uap_migration_failed') }}.

# --------------------------------------------------------------------------- #
# 3. People blocked or removed by ACS
# --------------------------------------------------------------------------- #
- id: nma_people_blocked_or_removed
  alias: "NMA · People blocked or removed"
  description: "Fires when any person is blocked or removed by ACS."
  mode: single
  triggers:
    - trigger: numeric_state
      entity_id:
        - sensor.red_bull_sandbox_people_blocked_by_acs
        - sensor.red_bull_sandbox_people_removed_by_acs
      above: 0
  actions:
    - action: persistent_notification.create
      data:
        notification_id: nma_people_blocked_or_removed
        title: "NMA: people blocked/removed"
        message: >-
          People blocked by ACS: {{ states('sensor.red_bull_sandbox_people_blocked_by_acs') }},
          removed by ACS: {{ states('sensor.red_bull_sandbox_people_removed_by_acs') }}.
    - action: notify.mobile_app_bart_iphone15
      data:
        title: "NMA: people blocked/removed"
        message: >-
          People blocked {{ states('sensor.red_bull_sandbox_people_blocked_by_acs') }},
          removed {{ states('sensor.red_bull_sandbox_people_removed_by_acs') }}.

# --------------------------------------------------------------------------- #
# 4. ACS WebSocket down for more than 5 minutes
# --------------------------------------------------------------------------- #
- id: nma_acs_websocket_down
  alias: "NMA · ACS WebSocket down"
  description: "Fires when the ACS WebSocket stays down for 5 minutes."
  mode: single
  triggers:
    - trigger: state
      entity_id: binary_sensor.red_bull_sandbox_acs_websocket
      to: "off"
      for:
        minutes: 5
  actions:
    - action: persistent_notification.create
      data:
        notification_id: nma_acs_websocket_down
        title: "NMA: ACS WebSocket down"
        message: "The ACS WebSocket has been down for 5 minutes."
    - action: notify.mobile_app_bart_iphone15
      data:
        title: "NMA: ACS WebSocket down"
        message: "The ACS WebSocket has been down for 5 minutes."

# --------------------------------------------------------------------------- #
# 5. API unreachable for more than 10 minutes
# --------------------------------------------------------------------------- #
- id: nma_api_unreachable
  alias: "NMA · API unreachable"
  description: "Fires when the NMA API has been unreachable for 10 minutes."
  mode: single
  triggers:
    - trigger: state
      entity_id: binary_sensor.red_bull_sandbox_api_reachable
      to: "off"
      for:
        minutes: 10
  actions:
    - action: persistent_notification.create
      data:
        notification_id: nma_api_unreachable
        title: "NMA: API unreachable"
        message: >-
          The NMA API has been unreachable for 10 minutes.
          Last error: {{ state_attr('binary_sensor.red_bull_sandbox_api_reachable', 'last_error') }}
    - action: notify.mobile_app_bart_iphone15
      data:
        title: "NMA: API unreachable"
        message: >-
          NMA API unreachable for 10 min.
          Last error: {{ state_attr('binary_sensor.red_bull_sandbox_api_reachable', 'last_error') }}

# --------------------------------------------------------------------------- #
# 6. ACS WebSocket message backlog building up
# --------------------------------------------------------------------------- #
- id: nma_acs_backlog
  alias: "NMA · ACS message backlog"
  description: "Fires when pending ACS messages stay above 50 for 10 minutes."
  mode: single
  triggers:
    - trigger: numeric_state
      entity_id: sensor.red_bull_sandbox_acs_websocket_pending_messages
      above: 50
      for:
        minutes: 10
  actions:
    - action: persistent_notification.create
      data:
        notification_id: nma_acs_backlog
        title: "NMA: ACS message backlog"
        message: >-
          {{ states('sensor.red_bull_sandbox_acs_websocket_pending_messages') }}
          messages pending on the ACS WebSocket for over 10 minutes.
    - action: notify.mobile_app_bart_iphone15
      data:
        title: "NMA: ACS message backlog"
        message: >-
          {{ states('sensor.red_bull_sandbox_acs_websocket_pending_messages') }}
          messages pending on the ACS WebSocket for over 10 minutes.
